services:
  parcels-n-at:
    profiles: [ parcels-n-at ]
    build:
      context: .
      dockerfile: apps/parcels-n-at/Dockerfile
    ports:
      - "3033:3000"
    environment:
      NEXT_PUBLIC_MAPTILER_API_KEY: ${NEXT_PUBLIC_MAPTILER_API_KEY}
      BASE_URL: ${BASE_URL}
      CKAN_API_TOKEN: ${CKAN_API_TOKEN}
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSERNAME: ${PGUSERNAME}
      PGPASSWORD: ${PGPASSWORD}
      NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST}
      NEXT_PUBLIC_OWNER_AGG_BLACKLIST: ${NEXT_PUBLIC_OWNER_AGG_BLACKLIST}
      SOLR_URL: http://solr:8983/solr/parcels
      HEALTHCHECK_PARCEL_ID: ${HEALTHCHECK_PARCEL_ID:-0002B00051000000}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/explore?parcel='+process.env.HEALTHCHECK_PARCEL_ID).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - autoheal=true

  greenprint:
    profiles: [ greenprint ]
    build:
      context: .
      dockerfile: apps/greenprint/Dockerfile
    ports:
      - "3034:3000"
    environment:
      NEXT_PUBLIC_MAPTILER_API_KEY: ${NEXT_PUBLIC_MAPTILER_API_KEY}
      BASE_URL: ${BASE_URL}
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSERNAME: ${PGUSERNAME}
      PGPASSWORD: ${PGPASSWORD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  solr:
    profiles: [ parcels-n-at, solr, etl ]
    image: solr:9.10.1
    volumes:
      - solr_data:/var/solr
      - ./tools/solr/configsets/parcels:/configsets/parcels:ro
    command: solr-precreate parcels /configsets/parcels
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8983/solr/parcels/admin/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  etl:
    profiles: [ etl ]
    build:
      context: .
      dockerfile: tools/etl/parcels-solr/Dockerfile
    environment:
      SOLR_URL: http://solr:8983/solr/parcels
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSERNAME: ${PGUSERNAME}
      PGPASSWORD: ${PGPASSWORD}
    networks:
      - default
    depends_on:
      solr:
        condition: service_healthy

  housecat:
    profiles: [ housecat ]
    build:
      context: .
      dockerfile: apps/housecat/Dockerfile
    ports:
      - "3001:3000"

  website:
    profiles: [ website ]
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    ports:
      - "3000:3000"

  autoheal:
    image: willfarrell/autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  solr_data: